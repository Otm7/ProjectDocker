version: "3.9"

services:
  nginx1:
    image: nginx:latest
    ports:
      - "8081:80"
    volumes:
      - ./app:/var/www
      - ./nginx1/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php1
      - mysql-db
    networks:
      - tp3iw_esgi_net

  nginx2:
    image: nginx:latest
    ports:
      - "8082:80"
    volumes:
      - ./app:/var/www
      - ./nginx2/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php2
      - mysql-db
    networks:
      - tp3iw_esgi_net

  php1:
    build: ./php
    image: php-laravel-esgi
    volumes:
      - ./app:/var/www
      - esgi_tp_final_cache:/cache:ro
    depends_on:
      - mysql-db
    networks:
      - tp3iw_esgi_net
    command: ["/bin/bash", "/init-laravel-3iw.sh"]

  php2:
    build: ./php
    image: php-laravel-esgi
    volumes:
      - ./app:/var/www
      - esgi_tp_final_cache:/cache:ro
    depends_on:
      - mysql-db
    networks:
      - tp3iw_esgi_net
    command: ["/bin/bash", "/init-laravel-3iw.sh"]

  mysql-db:
    image: mysql:8
    hostname: esgi-mysql
    ports:
      - "3307:3307"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    command: --port=3307
    volumes:
      - ./mysql/data:/var/lib/mysql
    networks:
      - tp3iw_esgi_net

networks:
  tp3iw_esgi_net:

volumes:
  esgi_tp_final_cache:
